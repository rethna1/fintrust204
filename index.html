<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="icon-192.png">

<link rel="apple-touch-icon" href="icon-192.png">

<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>CSC Master Search Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f4f6f9;
padding:10px;
}

h2{
text-align:center;
color:#2c3e50;
}

.container{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
margin-bottom:15px;
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:2px solid #bfc9d1;
font-size:16px;
box-sizing:border-box;
}

.result{
background:#ecf0f1;
padding:12px;
border-radius:8px;
margin-top:10px;
line-height:1.5;
}

/* BUTTON ROW */
.btn-row{
display:flex;
gap:8px;
margin-top:10px;
}

.btn-row .small-btn{
flex:1;
padding:8px;
font-size:14px;
white-space:nowrap;
}

button{
padding:10px;
margin-top:5px;
width:100%;
border:none;
border-radius:5px;
background:#2c3e50;
color:white;
font-size:15px;
}

.small-btn{
width:auto;
background:#555;
}

.delete{
background:#e74c3c;
}

.backup{
background:#25D366;
}
</style>
</head>

<body>

<h2>CSC Master Search</h2>

<!-- INCOME -->
<div class="container">
<h3>Today's Income</h3>
<p><b>Total: ₹ <span id="todayIncome">0</span></b></p>
<button onclick="resetIncome()">Reset Today</button>
</div>

<!-- SEARCH -->
<div class="container">
<input type="text" id="search" placeholder="Search service..." onkeyup="searchService()">
</div>

<!-- ADD -->
<div class="container">
<h3>Add Service</h3>

<input id="newName" placeholder="Service Name">
<input id="newKeywords" placeholder="Keywords">
<input id="newDocuments" placeholder="Documents">
<textarea id="newSteps" placeholder="Steps"></textarea>
<input id="newTime" placeholder="Time">
<input id="newCharge" placeholder="Charge ₹">
<textarea id="newDownload" placeholder="Download Steps"></textarea>
<textarea id="newNote" placeholder="Notes"></textarea>

<button onclick="addService()">Add</button>
</div>

<!-- EDIT -->
<div class="container">
<h3>Edit Service</h3>

<input type="hidden" id="editIndex">

<input id="editName" placeholder="Service Name">
<input id="editKeywords" placeholder="Keywords">
<input id="editDocuments" placeholder="Documents">
<textarea id="editSteps" placeholder="Steps"></textarea>
<input id="editTime" placeholder="Time">
<input id="editCharge" placeholder="Charge ₹">
<textarea id="editDownload" placeholder="Download Steps"></textarea>
<textarea id="editNote" placeholder="Notes"></textarea>

<button onclick="updateService()">Update Service</button>
</div>

<!-- BACKUP -->
<div class="container">
<h3>Backup & Restore</h3>

<button class="backup" onclick="backupWhatsApp()">Backup to WhatsApp</button>

<textarea id="restoreBox" placeholder="Paste backup data here"></textarea>

<button onclick="restoreFromText()">Restore Data</button>
</div>

<!-- RESULTS -->
<div class="container">
<h3>Search Results</h3>
<div id="output"></div>
</div>

<script>

let services = JSON.parse(localStorage.getItem("services")) || [];

function saveLocal(){
localStorage.setItem("services", JSON.stringify(services));
}

/* SEARCH */
function searchService(){

let input = document.getElementById("search").value.toLowerCase();
let output = "";

let sorted = [...services].sort((a,b)=>
(a.name||"").toLowerCase().localeCompare((b.name||"").toLowerCase())
);

sorted.forEach((s)=>{

if((s.name||"").toLowerCase().includes(input) || 
(s.keywords||"").toLowerCase().includes(input)){

let i = services.indexOf(s);

output += `
<div class="result">

<h3>${s.name}</h3>

<b>Documents:</b><br>${s.documents||""}<br><br>
<b>Steps:</b><br>${s.steps||""}<br><br>
<b>Time:</b> ${s.time||""}<br>

${s.charge ? `<b>Charge:</b> ₹${s.charge}<br>` : ""}
${s.download ? `<br><b>Download:</b><br>${s.download}<br>` : ""}
${s.note ? `<br><b>Note:</b><br>${s.note}<br>` : ""}

<div class="btn-row">
<button class="small-btn" onclick="addIncome(${s.charge || 0})">Add ₹</button>
<button class="small-btn" onclick="loadEdit(${i})">Edit</button>
<button class="small-btn delete" onclick="deleteService(${i})">Delete</button>
</div>

</div>
`;
}
});

document.getElementById("output").innerHTML = output || "No service found";
}

/* ADD */
function addService(){

let name = newName.value.trim();

if(name===""){
alert("Enter Service Name");
return;
}

services.push({
name,
keywords:newKeywords.value,
documents:newDocuments.value,
steps:newSteps.value,
time:newTime.value,
charge:newCharge.value,
download:newDownload.value,
note:newNote.value
});

saveLocal();
clearAdd();
searchService();
}

/* LOAD EDIT */
function loadEdit(i){
let s = services[i];

editIndex.value = i;
editName.value = s.name||"";
editKeywords.value = s.keywords||"";
editDocuments.value = s.documents||"";
editSteps.value = s.steps||"";
editTime.value = s.time||"";
editCharge.value = s.charge||"";
editDownload.value = s.download||"";
editNote.value = s.note||"";
}

/* UPDATE */
function updateService(){

let i = editIndex.value;

if(i===""){
alert("Select service to edit");
return;
}

services[i] = {
name: editName.value.trim(),
keywords: editKeywords.value,
documents: editDocuments.value,
steps: editSteps.value,
time: editTime.value,
charge: editCharge.value,
download: editDownload.value,
note: editNote.value
};

saveLocal();
clearEdit();
searchService();

alert("Updated Successfully");
}

/* DELETE */
function deleteService(i){
if(confirm("Delete?")){
services.splice(i,1);
saveLocal();
searchService();
}
}

/* CLEAR */
function clearAdd(){
newName.value="";
newKeywords.value="";
newDocuments.value="";
newSteps.value="";
newTime.value="";
newCharge.value="";
newDownload.value="";
newNote.value="";
}

function clearEdit(){
editIndex.value="";
editName.value="";
editKeywords.value="";
editDocuments.value="";
editSteps.value="";
editTime.value="";
editCharge.value="";
editDownload.value="";
editNote.value="";
}

/* BACKUP */
function backupWhatsApp(){
let data = JSON.stringify(services);
let message = encodeURIComponent("CSC Backup:\n" + data);
window.open("https://wa.me/?text=" + message, "_blank");
}

/* RESTORE */
function restoreFromText(){
let text = restoreBox.value;

if(text.trim() === ""){
alert("Paste backup data");
return;
}

try{
text = text.replace("CSC Backup:", "").trim();
services = JSON.parse(text);

saveLocal();
searchService();

alert("Data Restored");

}catch{
alert("Invalid data");
}
}

/* INCOME */
function getTodayKey(){
let d = new Date();
return "income_" + d.toISOString().slice(0,10);
}

function loadIncome(){
let total = localStorage.getItem(getTodayKey()) || 0;
todayIncome.innerText = total;
}

function addIncome(amount){

if(!amount || amount == 0){
let input = prompt("Enter amount ₹:");
if(input === null) return;
amount = parseFloat(input);
if(isNaN(amount)){
alert("Invalid amount");
return;
}
}

let key = getTodayKey();
let current = parseFloat(localStorage.getItem(key)) || 0;

current += amount;
localStorage.setItem(key, current);
loadIncome();
}

function resetIncome(){
if(confirm("Reset today?")){
localStorage.setItem(getTodayKey(), 0);
loadIncome();
}
}

/* LOAD */
searchService();
loadIncome();

</script>
<!-- Scroll to Top Button (Off-white + Black Icon) -->
<style>
#scrollTopBtn {
  position: fixed;
  right: 20px;
  bottom: 25px;
  width: 55px;
  height: 55px;
  background-color: #f8f8f8; /* Off-white */
  border: none;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
}

#scrollTopBtn.show {
  opacity: 1;
  visibility: visible;
}

#scrollTopBtn svg {
  width: 22px;
  height: 22px;
  fill: none;
  stroke: #000000; /* BLACK arrow */
  stroke-width: 4;
  stroke-linecap: round;
  stroke-linejoin: round;
}

#scrollTopBtn:hover {
  background-color: #e8e8e8;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}
</style>

<button onclick="topFunction()" id="scrollTopBtn" title="Go to top">
  <svg viewBox="0 0 24 24">
    <path d="M6 15l6-6 6 6" />
  </svg>
</button>

<script>
window.onscroll = function() {
  let btn = document.getElementById("scrollTopBtn");
  if (document.body.scrollTop > 150 || document.documentElement.scrollTop > 150) {
    btn.classList.add("show");
  } else {
    btn.classList.remove("show");
  }
};

function topFunction() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
  <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker Registered"));
}
</script>
</body>
</html>
